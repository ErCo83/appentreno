<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Entreno</title>
<meta name="theme-color" content="#1d4b39">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Sometype+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#eef0ec;--surface:#fff;--ink:#1a201d;--ink-soft:#69736d;--ink-faint:#9aa39c;
    --pitch:#1d4b39;--pitch-deep:#143527;--accent:#e2643a;--accent-soft:#f3b48f;
    --line:#e7e9e5;--line-2:#dfe2dd;--green:#2f8f5b;--red:#c2452e;
    --r:18px;--shadow:0 1px 2px rgba(20,40,30,.04),0 12px 28px -22px rgba(20,53,39,.4)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;
    font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
  h1,h2{font-family:"Bricolage Grotesque",sans-serif;letter-spacing:-.02em;line-height:1.08}
  .mono{font-family:"Sometype Mono",monospace}
  header{background:linear-gradient(155deg,var(--pitch),var(--pitch-deep));color:#eef3ef;
    padding:26px 18px 24px;position:relative;overflow:hidden;border-radius:0 0 24px 24px}
  header::after{content:"";position:absolute;right:-70px;top:-70px;width:200px;height:200px;
    border-radius:50%;border:1.5px solid rgba(255,255,255,.12)}
  header .eyebrow{font-family:"Sometype Mono",monospace;font-size:10.5px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--accent-soft)}
  header h1{font-size:1.7rem;font-weight:800;margin-top:5px}
  main{padding:22px 16px 40px;max-width:440px;margin:0 auto}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:22px 18px;box-shadow:var(--shadow);margin-bottom:14px}
  label{display:block;font-family:"Sometype Mono",monospace;font-size:9.5px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-soft);margin:14px 0 5px}
  label:first-of-type{margin-top:0}
  input{width:100%;font-family:"Hanken Grotesk",sans-serif;font-size:1rem;padding:12px;
    border:1px solid var(--line-2);border-radius:11px;background:var(--surface);color:var(--ink)}
  input:focus{outline:none;border-color:var(--accent)}
  button{cursor:pointer;font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:.97rem;
    width:100%;padding:13px 16px;border:none;border-radius:13px}
  button:disabled{opacity:.55;cursor:wait}
  .primary{background:var(--accent);color:#fff;margin-top:18px}
  .ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line-2);margin-top:10px}
  .google{background:#fff;color:var(--ink);border:1px solid var(--line-2);margin-top:10px;
    display:flex;align-items:center;justify-content:center;gap:10px}
  .google svg{width:18px;height:18px;flex:none}
  .divider{display:flex;align-items:center;gap:10px;margin:18px 0 8px;color:var(--ink-faint);
    font-family:"Sometype Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line-2)}
  .msg{display:none;border-radius:12px;padding:11px 13px;font-size:.88rem;margin-bottom:14px}
  .msg.err{display:block;background:#fbeae5;border:1px solid #efb9a6;color:#8c3b20}
  .msg.ok{display:block;background:#e2f0e8;border:1px solid #a9d4bc;color:#20603c}
  .muted{color:var(--ink-soft);font-size:.88rem}
  .sessionbox{text-align:center;padding:6px 0 2px}
  .sessionbox .big{font-size:2.4rem;line-height:1}
  .sessionbox h2{font-size:1.25rem;margin-top:10px}
  .sessionbox .email{font-family:"Sometype Mono",monospace;font-size:.85rem;color:var(--pitch);
    background:#eaf1ec;border:1px solid #d3e2d8;border-radius:999px;display:inline-block;
    padding:6px 14px;margin-top:10px;word-break:break-all}
  .sessionbox .uid{font-family:"Sometype Mono",monospace;font-size:.62rem;color:var(--ink-faint);
    margin-top:10px;word-break:break-all}
  .note{background:#f7f8f6;border:1px solid var(--line);border-radius:12px;padding:11px 14px;
    margin-top:16px;font-size:.86rem;color:var(--ink-soft)}
</style>
</head>
<body>
<header>
  <div class="eyebrow">v2 · multi-usuario</div>
  <h1 id="headTitle">Entreno</h1>
</header>
<main>
  <div id="gmsg" class="msg"></div>

  <!-- ===== PANTALLA DE ACCESO ===== -->
  <section id="authView" hidden>
    <div class="card">
      <h2 style="font-size:1.2rem;margin-bottom:4px">Ingresá a tu cuenta</h2>
      <p class="muted" style="margin-bottom:14px">O creá una nueva, tarda segundos.</p>
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" inputmode="email" placeholder="tu@email.com">
      <label for="pass">Contraseña</label>
      <input id="pass" type="password" autocomplete="current-password" placeholder="mínimo 6 caracteres">
      <button class="primary" id="btnLogin">Entrar</button>
      <button class="ghost" id="btnSignup">Crear cuenta nueva</button>
      <div class="divider">o</div>
      <button class="google" id="btnGoogle">
        <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.2 5.2C40.8 35.4 44 30.2 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
        Continuar con Google
      </button>
    </div>
  </section>

  <!-- ===== PANTALLA INTERIOR (sesión iniciada) ===== -->
  <section id="appView" hidden>
    <div class="card sessionbox">
      <div class="big">✅</div>
      <h2>Sesión iniciada</h2>
      <div class="email" id="userEmail">—</div>
      <div class="uid" id="userId"></div>
      <button class="ghost" id="btnLogout" style="margin-top:20px">Cerrar sesión</button>
    </div>
    <div class="note">🏗️ Acá va a vivir tu calendario. En la próxima sesión migramos el módulo de Actividad y esta pantalla se convierte en la app de verdad.</div>
  </section>
</main>

<script>
/* ======================= CONFIGURACIÓN =======================
   Pegá los dos valores desde Supabase:
   Settings (engranaje del proyecto) > API / API Keys
   - Project URL  -> SUPABASE_URL
   - anon public (o "publishable") -> SUPABASE_ANON_KEY
   La anon key está DISEÑADA para ser pública: la seguridad real
   la aporta el RLS que ya activamos en la base.               */
const CONFIG = {
  SUPABASE_URL: "https://gvyovnxmhjhwftvrmhqz.supabase.co/rest/v1/",
  SUPABASE_ANON_KEY: "sb_publishable_-VJ7diPZrpBZVbBrCwddjw_QY85GsD0"
};
/* ============================================================= */

let sb = null;

function el(id){ return document.getElementById(id); }
function gmsg(kind, text){ const m = el("gmsg"); m.className = "msg" + (kind ? " " + kind : ""); m.textContent = text || ""; }
function pageUrl(){ return location.href.split("#")[0].split("?")[0]; }

const ERRORES = [
  [/invalid login credentials/i, "Email o contraseña incorrectos."],
  [/user already registered|already been registered/i, "Ese email ya tiene una cuenta. Probá con «Entrar»."],
  [/password should be at least/i, "La contraseña debe tener al menos 6 caracteres."],
  [/unable to validate email|invalid format/i, "Ese email no parece válido, revisalo."],
  [/rate limit/i, "Demasiados intentos seguidos. Esperá un minuto y probá de nuevo."],
  [/network|fetch/i, "Problema de conexión. Revisá tu internet e intentá otra vez."]
];
function traducir(err){
  const msg = (err && err.message) || String(err || "");
  for (const [re, txt] of ERRORES) if (re.test(msg)) return txt;
  return "No se pudo completar: " + msg;
}

function render(session){
  const logueado = !!(session && session.user);
  el("authView").hidden = logueado;
  el("appView").hidden = !logueado;
  if (logueado){
    el("userEmail").textContent = session.user.email || "(sin email)";
    el("userId").textContent = "id " + session.user.id;
    gmsg(null, "");
  }
}

async function conBoton(btn, fn){
  const b = el(btn); const txt = b.textContent;
  b.disabled = true; b.textContent = "…";
  try { await fn(); } finally { b.disabled = false; b.textContent = txt; }
}

async function login(){
  gmsg(null, "");
  const email = el("email").value.trim(), password = el("pass").value;
  if (!email || !password){ gmsg("err", "Completá email y contraseña."); return; }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) gmsg("err", traducir(error));
}

async function signup(){
  gmsg(null, "");
  const email = el("email").value.trim(), password = el("pass").value;
  if (!email || !password){ gmsg("err", "Completá email y contraseña para crear la cuenta."); return; }
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error){ gmsg("err", traducir(error)); return; }
  if (data && data.session) gmsg("ok", "¡Cuenta creada! Ya estás adentro.");
  else gmsg("ok", "Cuenta creada. Revisá tu email para confirmarla y después entrá.");
}

async function google(){
  gmsg(null, "");
  const { error } = await sb.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: pageUrl() }
  });
  if (error) gmsg("err", traducir(error));
}

async function logout(){
  const { error } = await sb.auth.signOut();
  if (error) gmsg("err", traducir(error));
}

function init(){
  if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_ANON_KEY){
    el("authView").hidden = false;
    gmsg("err", "⚙️ Falta pegar SUPABASE_URL y SUPABASE_ANON_KEY en el bloque CONFIG del archivo.");
    ["btnLogin","btnSignup","btnGoogle"].forEach(id => el(id).disabled = true);
    return;
  }
  sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  sb.auth.onAuthStateChange((_evento, session) => render(session));
  sb.auth.getSession().then(({ data }) => render(data.session));
  el("btnLogin").onclick  = () => conBoton("btnLogin",  login);
  el("btnSignup").onclick = () => conBoton("btnSignup", signup);
  el("btnGoogle").onclick = () => conBoton("btnGoogle", google);
  el("btnLogout").onclick = () => conBoton("btnLogout", logout);
  el("pass").addEventListener("keydown", e => { if (e.key === "Enter") conBoton("btnLogin", login); });
}
init();
</script>
</body>
</html>
